name: Sync to GitLab Branch
on: 
  push:
    branches:
      - main  # Set this to the branch your UI tool pushes to

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitLab Specific Branch
        run: |
          # Add the GitLab remote using a Personal Access Token (PAT)
          # git remote add gitlab https://x-access-token:${{ secrets.GITLAB_TOKEN }}@gitlab.openchip.local:umakanth.srinivasan/boosterux.git
          git remote add gitlab https://umakanth.srinivasan:${{ secrets.GITLAB_TOKEN }}@gitlab.openchip.local/umakanth.srinivasan/boosterux.git
          
          # Syntax: git push <remote> <local_branch>:<remote_branch>
          # This pushes the local 'main' branch to the 'prod-ui-sync' branch on GitLab
          git push gitlab main:beta-features-product-cut --force
